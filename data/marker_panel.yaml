# Expanded marker/TF panel (Part B: widen the model's input beyond the ~50 core KG genes).
# Each gene is auto-injected by kg.load_kg as a "marker" node (gene_map entry + an
# ACTIVATES edge to its program), UNLESS its symbol is already represented in the base KG.
# Positive markers only (genes UP in the program). Human symbols; the ingestion pipeline
# upper-cases, so mouse orthologs match by symbol. Sparse coverage across datasets is fine.
